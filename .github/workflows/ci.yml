name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    name: Validate lessons
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install course dependencies
        run: pip install -r requirements.txt
      - name: Run every Python snippet
        run: python3 tools/check_snippets.py
      - name: Check internal links and anchors
        run: python3 tools/check_links.py
      - name: Verify notebooks are in sync with the lessons
        run: |
          python3 tools/build_notebooks.py
          git diff --exit-code notebooks/ \
            || (echo "::error::Notebooks are out of date. Run 'make notebooks' and commit." && exit 1)

  build-site:
    name: Build site (strict)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install docs dependencies
        run: pip install -r requirements-docs.txt
      - name: Build with MkDocs (fails on broken nav/links)
        run: mkdocs build --strict
