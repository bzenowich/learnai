<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" role="img" aria-label="The dot product measures alignment: aligned vectors give a high positive score, perpendicular vectors give zero, and opposite vectors give a negative score.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="va" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4f46e5"/></marker>
    <marker id="vb" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker>
  </defs>
  <rect x="8" y="8" width="744" height="304" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="380" y="42" text-anchor="middle" font-size="15" fill="#64748b">The <tspan font-weight="700" fill="#1e293b">dot product</tspan> scores how much two vectors point the same way</text>

  <!-- Panel 1: Aligned -->
  <g transform="translate(40,70)">
    <rect x="0" y="0" width="214" height="206" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="107" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Aligned</text>
    <circle cx="60" cy="130" r="3.5" fill="#475569"/>
    <line x1="60" y1="130" x2="168" y2="70" stroke="#4f46e5" stroke-width="3.5" marker-end="url(#va)"/>
    <line x1="60" y1="130" x2="160" y2="92" stroke="#e11d48" stroke-width="3.5" marker-end="url(#vb)"/>
    <text x="174" y="64" font-size="13" font-weight="700" fill="#4f46e5">A</text>
    <text x="166" y="108" font-size="13" font-weight="700" fill="#e11d48">B</text>
    <rect x="34" y="160" width="146" height="30" rx="15" fill="#ecfdf5" stroke="#059669"/>
    <text x="107" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">A · B &gt; 0</text>
  </g>

  <!-- Panel 2: Orthogonal -->
  <g transform="translate(273,70)">
    <rect x="0" y="0" width="214" height="206" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="107" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Perpendicular</text>
    <circle cx="70" cy="130" r="3.5" fill="#475569"/>
    <line x1="70" y1="130" x2="170" y2="130" stroke="#4f46e5" stroke-width="3.5" marker-end="url(#va)"/>
    <line x1="70" y1="130" x2="70" y2="60" stroke="#e11d48" stroke-width="3.5" marker-end="url(#vb)"/>
    <path d="M70,112 L88,112 L88,130" fill="none" stroke="#94a3b8" stroke-width="1.5"/>
    <text x="176" y="126" font-size="13" font-weight="700" fill="#4f46e5">A</text>
    <text x="58" y="56" font-size="13" font-weight="700" fill="#e11d48">B</text>
    <rect x="34" y="160" width="146" height="30" rx="15" fill="#f1f5f9" stroke="#94a3b8"/>
    <text x="107" y="180" text-anchor="middle" font-size="13" font-weight="700" fill="#475569">A · B = 0</text>
  </g>

  <!-- Panel 3: Opposite -->
  <g transform="translate(506,70)">
    <rect x="0" y="0" width="214" height="206" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="107" y="28" text-anchor="middle" font-size="15" font-weight="700" fill="#334155">Opposite</text>
    <circle cx="107" cy="118" r="3.5" fill="#475569"/>
    <line x1="107" y1="118" x2="180" y2="78" stroke="#4f46e5" stroke-width="3.5" marker-end="url(#va)"/>
    <line x1="107" y1="118" x2="34" y2="158" stroke="#e11d48" stroke-width="3.5" marker-end="url(#vb)"/>
    <text x="186" y="74" font-size="13" font-weight="700" fill="#4f46e5">A</text>
    <text x="22" y="162" font-size="13" font-weight="700" fill="#e11d48">B</text>
    <rect x="34" y="170" width="146" height="30" rx="15" fill="#fff1f2" stroke="#e11d48"/>
    <text x="107" y="190" text-anchor="middle" font-size="13" font-weight="700" fill="#9f1239">A · B &lt; 0</text>
  </g>

  <text x="147" y="302" text-anchor="middle" font-size="12.5" fill="#64748b">very similar</text>
  <text x="380" y="302" text-anchor="middle" font-size="12.5" fill="#64748b">unrelated</text>
  <text x="613" y="302" text-anchor="middle" font-size="12.5" fill="#64748b">opposite meaning</text>
</svg>
