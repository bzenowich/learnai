<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360" role="img" aria-label="Multiplying a 2x3 matrix by a 3-element vector produces a 2-element vector. Each output number is the dot product of one matrix row with the input vector: row one gives 14, row two gives 19.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
  </defs>
  <rect x="8" y="8" width="744" height="344" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="380" y="42" text-anchor="middle" font-size="15" fill="#64748b">Each output number is <tspan font-weight="700" fill="#1e293b">one dot product</tspan> of a row with the vector</text>

  <!-- Matrix W -->
  <g class="mono" font-size="17" font-weight="700" text-anchor="middle">
    <rect x="80" y="118" width="144" height="44" fill="#eef2ff" stroke="#c7d2fe"/>
    <rect x="80" y="162" width="144" height="44" fill="#ffe4e6" stroke="#fecdd3"/>
    <line x1="80" y1="162" x2="224" y2="162" stroke="#cbd5e1"/>
    <text x="104" y="146" fill="#3730a3">2</text><text x="152" y="146" fill="#3730a3">0</text><text x="200" y="146" fill="#3730a3">1</text>
    <text x="104" y="190" fill="#9f1239">1</text><text x="152" y="190" fill="#9f1239">3</text><text x="200" y="190" fill="#9f1239">0</text>
  </g>
  <path d="M74,118 h-8 v88 h8" fill="none" stroke="#475569" stroke-width="2"/>
  <path d="M230,118 h8 v88 h-8" fill="none" stroke="#475569" stroke-width="2"/>
  <text x="152" y="232" text-anchor="middle" font-size="12.5" fill="#64748b">W (2×3)</text>

  <text x="270" y="172" text-anchor="middle" font-size="22" fill="#94a3b8">×</text>

  <!-- vector x -->
  <g class="mono" font-size="17" font-weight="700" text-anchor="middle">
    <rect x="312" y="96" width="52" height="44" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="312" y="140" width="52" height="44" fill="#f8fafc" stroke="#cbd5e1"/>
    <rect x="312" y="184" width="52" height="44" fill="#f8fafc" stroke="#cbd5e1"/>
    <text x="338" y="124" fill="#334155">4</text>
    <text x="338" y="168" fill="#334155">5</text>
    <text x="338" y="212" fill="#334155">6</text>
  </g>
  <path d="M306,96 h-8 v132 h8" fill="none" stroke="#475569" stroke-width="2"/>
  <path d="M370,96 h8 v132 h-8" fill="none" stroke="#475569" stroke-width="2"/>
  <text x="338" y="248" text-anchor="middle" font-size="12.5" fill="#64748b">x (3×1)</text>

  <text x="410" y="172" text-anchor="middle" font-size="22" fill="#94a3b8">=</text>

  <!-- output y -->
  <g class="mono" font-size="17" font-weight="700" text-anchor="middle">
    <rect x="452" y="118" width="64" height="44" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
    <rect x="452" y="162" width="64" height="44" fill="#ffe4e6" stroke="#e11d48" stroke-width="1.5"/>
    <text x="484" y="146" fill="#3730a3">14</text>
    <text x="484" y="190" fill="#9f1239">19</text>
  </g>
  <text x="484" y="232" text-anchor="middle" font-size="12.5" fill="#64748b">y (2×1)</text>

  <!-- equations -->
  <rect x="548" y="116" width="184" height="48" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="560" y="138" font-size="12" class="mono" fill="#3730a3">[2 0 1]·[4 5 6]</text>
  <text x="560" y="156" font-size="12" class="mono" fill="#3730a3">= 8+0+6 = 14</text>
  <rect x="548" y="160" width="184" height="48" rx="10" fill="#ffe4e6" stroke="#fecdd3"/>
  <text x="560" y="182" font-size="12" class="mono" fill="#9f1239">[1 3 0]·[4 5 6]</text>
  <text x="560" y="200" font-size="12" class="mono" fill="#9f1239">= 4+15+0 = 19</text>

  <text x="380" y="318" text-anchor="middle" font-size="13" fill="#64748b">A matrix is just a <tspan font-weight="700" fill="#1e293b">stack of dot products</tspan> done all at once.</text>
</svg>
