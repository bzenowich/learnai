<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 340" width="760" height="340" role="img" aria-label="A neuron multiplies each input by a weight, sums them with a bias, then applies an activation function to produce the output.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="8" y="8" width="744" height="324" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>

  <!-- column headers -->
  <text x="92" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#0284c7">INPUTS</text>
  <text x="372" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#7c3aed">WEIGH &amp; SUM</text>
  <text x="560" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#d97706">ACTIVATE</text>
  <text x="688" y="46" text-anchor="middle" font-size="13" font-weight="700" fill="#0284c7">OUTPUT</text>

  <!-- weighted edges -->
  <line x1="124" y1="100" x2="316" y2="178" stroke="#cbd5e1" stroke-width="2.5"/>
  <line x1="124" y1="178" x2="316" y2="178" stroke="#cbd5e1" stroke-width="2.5"/>
  <line x1="124" y1="256" x2="316" y2="178" stroke="#cbd5e1" stroke-width="2.5"/>
  <text x="206" y="124" font-size="13" fill="#7c3aed" font-weight="700">w₁</text>
  <text x="214" y="172" font-size="13" fill="#7c3aed" font-weight="700">w₂</text>
  <text x="206" y="240" font-size="13" fill="#7c3aed" font-weight="700">w₃</text>

  <!-- inputs -->
  <circle cx="92" cy="100" r="26" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="92" y="106" text-anchor="middle" font-size="17" font-weight="700" fill="#0c4a6e">x₁</text>
  <circle cx="92" cy="178" r="26" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="92" y="184" text-anchor="middle" font-size="17" font-weight="700" fill="#0c4a6e">x₂</text>
  <circle cx="92" cy="256" r="26" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="92" y="262" text-anchor="middle" font-size="17" font-weight="700" fill="#0c4a6e">x₃</text>

  <!-- summation node -->
  <circle cx="350" cy="178" r="34" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="350" y="180" text-anchor="middle" font-size="26" font-weight="700" fill="#5b21b6">Σ</text>
  <text x="350" y="234" text-anchor="middle" font-size="13" fill="#7c3aed" font-weight="700">+ bias b</text>
  <line x1="384" y1="178" x2="510" y2="178" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- activation -->
  <rect x="514" y="140" width="92" height="76" rx="12" fill="#fffbeb" stroke="#d97706" stroke-width="2"/>
  <path d="M526,202 C548,202 548,154 582,154" fill="none" stroke="#d97706" stroke-width="3"/>
  <text x="560" y="232" text-anchor="middle" font-size="13" fill="#92400e" font-weight="700">f</text>
  <line x1="606" y1="178" x2="654" y2="178" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ah)"/>

  <!-- output -->
  <circle cx="690" cy="178" r="28" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="690" y="184" text-anchor="middle" font-size="18" font-weight="700" fill="#0c4a6e">y</text>

  <!-- formula -->
  <rect x="150" y="288" width="460" height="34" rx="17" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="380" y="310" text-anchor="middle" font-size="16" fill="#1e293b"><tspan font-style="italic" font-weight="700">y</tspan> = <tspan font-style="italic" fill="#d97706" font-weight="700">f</tspan>( <tspan fill="#7c3aed" font-weight="700">w₁x₁ + w₂x₂ + w₃x₃ + b</tspan> )</text>
</svg>
