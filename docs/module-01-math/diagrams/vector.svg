<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 320" width="760" height="320" role="img" aria-label="A triangle with base 5.0, height 4.0 and area 10.0 maps to the column vector [5.0, 4.0, 10.0].">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="8" y="8" width="744" height="304" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>

  <!-- Triangle (base 5, height 4, area = 1/2*5*4 = 10) -->
  <polygon points="90,250 290,250 90,110" fill="#eef2ff" stroke="#4f46e5" stroke-width="2.5" stroke-linejoin="round"/>
  <path d="M90,232 L108,232 L108,250" fill="none" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="190" y="278" text-anchor="middle" font-size="15" fill="#0284c7" font-weight="600">base = 5.0</text>
  <text x="78" y="184" text-anchor="end" font-size="15" fill="#059669" font-weight="600">height</text>
  <text x="78" y="202" text-anchor="end" font-size="15" fill="#059669" font-weight="600">= 4.0</text>
  <text x="158" y="230" text-anchor="middle" font-size="14" fill="#d97706" font-weight="600">area = 10.0</text>

  <!-- mapping arrows -->
  <path d="M300,196 C362,196 372,130 432,130" fill="none" stroke="#0284c7" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M300,210 C392,210 360,180 432,180" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#ah)"/>
  <path d="M300,224 C360,224 372,236 432,236" fill="none" stroke="#d97706" stroke-width="2" marker-end="url(#ah)"/>

  <!-- Column vector -->
  <text x="560" y="80" text-anchor="middle" font-size="15" fill="#64748b">vector  <tspan font-style="italic" fill="#1e293b" font-weight="700">v</tspan>  ∈  ℝ³</text>
  <path d="M468,104 h-12 v152 h12" fill="none" stroke="#475569" stroke-width="2.5"/>
  <path d="M652,104 h12 v152 h-12" fill="none" stroke="#475569" stroke-width="2.5"/>
  <rect x="478" y="108" width="166" height="44" rx="9" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="498" y="136" font-size="20" fill="#0c4a6e" font-weight="700">5.0</text>
  <text x="630" y="135" text-anchor="end" font-size="12" fill="#0284c7">base</text>
  <rect x="478" y="158" width="166" height="44" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="498" y="186" font-size="20" fill="#065f46" font-weight="700">4.0</text>
  <text x="630" y="185" text-anchor="end" font-size="12" fill="#059669">height</text>
  <rect x="478" y="208" width="166" height="44" rx="9" fill="#fffbeb" stroke="#d97706" stroke-width="1.5"/>
  <text x="498" y="236" font-size="20" fill="#92400e" font-weight="700">10.0</text>
  <text x="630" y="235" text-anchor="end" font-size="12" fill="#d97706">area</text>

  <text x="380" y="300" text-anchor="middle" font-size="13" fill="#94a3b8">To the AI, this ordered list of numbers <tspan font-style="italic">is</tspan> the triangle.</text>
</svg>
