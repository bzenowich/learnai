<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420" width="760" height="420" role="img" aria-label="In embedding space the step from man to king is the same as the step from woman to queen, so king minus man plus woman lands on queen.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="roy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#4f46e5"/></marker>
    <marker id="gen" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto"><path d="M0,0 L6,3 L0,6 Z" fill="#e11d48"/></marker>
  </defs>
  <rect x="8" y="8" width="744" height="404" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="380" y="44" text-anchor="middle" font-size="15" fill="#64748b">Words live as points in space — and the <tspan font-weight="700" fill="#1e293b">directions between them carry meaning</tspan></text>

  <!-- faint grid -->
  <g stroke="#f1f5f9" stroke-width="1">
    <line x1="120" y1="90" x2="120" y2="350"/><line x1="280" y1="90" x2="280" y2="350"/>
    <line x1="440" y1="90" x2="440" y2="350"/><line x1="600" y1="90" x2="600" y2="350"/>
    <line x1="90" y1="130" x2="640" y2="130"/><line x1="90" y1="240" x2="640" y2="240"/><line x1="90" y1="320" x2="640" y2="320"/>
  </g>

  <!-- points: man(200,300) king(260,140) woman(470,300) queen(530,140) -->
  <!-- royalty offset (man->king and woman->queen), indigo -->
  <line x1="200" y1="300" x2="260" y2="148" stroke="#4f46e5" stroke-width="3" marker-end="url(#roy)"/>
  <line x1="470" y1="300" x2="530" y2="148" stroke="#4f46e5" stroke-width="3" marker-end="url(#roy)"/>
  <!-- gender offset (man->woman and king->queen), rose -->
  <line x1="212" y1="305" x2="458" y2="305" stroke="#e11d48" stroke-width="3" marker-end="url(#gen)"/>
  <line x1="272" y1="140" x2="518" y2="140" stroke="#e11d48" stroke-width="3" marker-end="url(#gen)"/>

  <!-- offset labels -->
  <text x="150" y="228" text-anchor="end" font-size="13" font-weight="700" fill="#4f46e5">+ royalty</text>
  <text x="335" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#e11d48">+ female</text>

  <!-- nodes -->
  <g>
    <circle cx="200" cy="300" r="7" fill="#475569"/>
    <rect x="150" y="312" width="68" height="26" rx="13" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="184" y="330" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">man</text>
  </g>
  <g>
    <circle cx="470" cy="300" r="7" fill="#475569"/>
    <rect x="452" y="312" width="86" height="26" rx="13" fill="#f1f5f9" stroke="#cbd5e1"/>
    <text x="495" y="330" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">woman</text>
  </g>
  <g>
    <circle cx="260" cy="140" r="7" fill="#4f46e5"/>
    <rect x="214" y="104" width="62" height="26" rx="13" fill="#eef2ff" stroke="#4f46e5"/>
    <text x="245" y="122" text-anchor="middle" font-size="14" font-weight="700" fill="#3730a3">king</text>
  </g>
  <g>
    <circle cx="530" cy="140" r="8" fill="#059669"/>
    <rect x="540" y="124" width="80" height="30" rx="15" fill="#ecfdf5" stroke="#059669"/>
    <text x="580" y="145" text-anchor="middle" font-size="15" font-weight="700" fill="#065f46">queen</text>
  </g>

  <!-- equation -->
  <rect x="190" y="364" width="380" height="36" rx="18" fill="#f8fafc" stroke="#e2e8f0"/>
  <text x="380" y="388" text-anchor="middle" font-size="17" fill="#1e293b"><tspan font-weight="700" fill="#3730a3">king</tspan> − <tspan font-weight="700" fill="#334155">man</tspan> + <tspan font-weight="700" fill="#334155">woman</tspan> ≈ <tspan font-weight="700" fill="#065f46">queen</tspan></text>
</svg>
