<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 400" width="760" height="400" role="img" aria-label="A 2D embedding space where fruit words (apple, orange, banana) cluster together in one region and appliance words (toaster, blender, fridge) cluster in a distant region. Similar meanings sit close together.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="8" y="8" width="744" height="384" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="380" y="42" text-anchor="middle" font-size="15" fill="#64748b">Embeddings place words in space so <tspan font-weight="700" fill="#1e293b">meaning becomes location</tspan></text>

  <!-- plot frame -->
  <rect x="70" y="64" width="620" height="270" rx="10" fill="#f8fafc" stroke="#e2e8f0"/>
  <!-- axes -->
  <line x1="70" y1="334" x2="690" y2="334" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="70" y1="334" x2="70" y2="64" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <text x="690" y="354" text-anchor="end" font-size="12" fill="#94a3b8">dimension 1 →</text>
  <text x="58" y="74" text-anchor="start" font-size="12" fill="#94a3b8" transform="rotate(-90 58 74)" >dimension 2 →</text>

  <!-- fruit cluster (green, top-right) -->
  <ellipse cx="540" cy="150" rx="110" ry="78" fill="#ecfdf5" stroke="#059669" stroke-width="1.5" stroke-dasharray="6 5"/>
  <g fill="#059669">
    <circle cx="500" cy="130" r="6"/><circle cx="575" cy="120" r="6"/><circle cx="555" cy="185" r="6"/>
  </g>
  <g font-size="13" font-weight="700" fill="#065f46">
    <text x="500" y="118" text-anchor="middle">apple</text>
    <text x="575" y="108" text-anchor="middle">orange</text>
    <text x="555" y="205" text-anchor="middle">banana</text>
  </g>
  <text x="540" y="244" text-anchor="middle" font-size="12.5" font-weight="700" fill="#059669">FRUITS</text>

  <!-- appliance cluster (amber, bottom-left) -->
  <ellipse cx="215" cy="250" rx="110" ry="72" fill="#fff7ed" stroke="#d97706" stroke-width="1.5" stroke-dasharray="6 5"/>
  <g fill="#d97706">
    <circle cx="180" cy="235" r="6"/><circle cx="255" cy="228" r="6"/><circle cx="225" cy="285" r="6"/>
  </g>
  <g font-size="13" font-weight="700" fill="#92400e">
    <text x="180" y="223" text-anchor="middle">toaster</text>
    <text x="255" y="216" text-anchor="middle">blender</text>
    <text x="225" y="305" text-anchor="middle">fridge</text>
  </g>
  <text x="215" y="200" text-anchor="middle" font-size="12.5" font-weight="700" fill="#d97706">APPLIANCES</text>

  <!-- distance line -->
  <line x1="300" y1="245" x2="455" y2="160" stroke="#cbd5e1" stroke-width="2" stroke-dasharray="4 4"/>
  <text x="378" y="195" text-anchor="middle" font-size="11.5" fill="#94a3b8" transform="rotate(-29 378 195)">far apart = unrelated</text>

  <text x="380" y="374" text-anchor="middle" font-size="13" fill="#64748b">Nearby vectors share meaning; distant vectors do not — that's what the model learns.</text>
</svg>
