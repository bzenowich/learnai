<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 780 400" width="780" height="400" role="img" aria-label="Attention scores the query for 'bank' against every word's key, turns the scores into softmax weights (river 80%, bank 15%, the 5%), and blends the values into a context-aware vector for 'bank'.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="8" y="8" width="764" height="384" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="390" y="38" text-anchor="middle" font-size="14.5" fill="#64748b">How much should <tspan font-weight="700" fill="#1e293b">"bank"</tspan> listen to each other word? Sentence: "The river bank"</text>

  <!-- stage headers -->
  <text x="92" y="74" text-anchor="middle" font-size="12.5" font-weight="700" fill="#7c3aed">① QUERY</text>
  <text x="300" y="74" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0284c7">② SCORE vs KEYS</text>
  <text x="500" y="74" text-anchor="middle" font-size="12.5" font-weight="700" fill="#d97706">③ SOFTMAX WEIGHT</text>
  <text x="678" y="74" text-anchor="middle" font-size="12.5" font-weight="700" fill="#059669">④ BLEND VALUES</text>

  <!-- query -->
  <rect x="30" y="160" width="124" height="86" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="2"/>
  <text x="92" y="190" text-anchor="middle" font-size="16" font-weight="700" fill="#5b21b6">Q "bank"</text>
  <text x="92" y="212" text-anchor="middle" font-size="11.5" fill="#6d28d9">what context</text>
  <text x="92" y="228" text-anchor="middle" font-size="11.5" fill="#6d28d9">do I need?</text>

  <!-- query to keys -->
  <line x1="154" y1="200" x2="236" y2="120" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="154" y1="203" x2="236" y2="203" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="154" y1="206" x2="236" y2="286" stroke="#cbd5e1" stroke-width="2"/>

  <!-- key chips -->
  <g font-size="14" font-weight="700">
    <rect x="238" y="100" width="120" height="40" rx="9" fill="#f0f9ff" stroke="#0284c7"/>
    <text x="252" y="125" fill="#0c4a6e">K: "the"</text>
    <rect x="238" y="183" width="120" height="40" rx="9" fill="#f0f9ff" stroke="#0284c7"/>
    <text x="252" y="208" fill="#0c4a6e">K: "river"</text>
    <rect x="238" y="266" width="120" height="40" rx="9" fill="#f0f9ff" stroke="#0284c7"/>
    <text x="252" y="291" fill="#0c4a6e">K: "bank"</text>
  </g>

  <!-- score->weight arrows -->
  <line x1="358" y1="120" x2="402" y2="120" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="358" y1="203" x2="402" y2="203" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <line x1="358" y1="286" x2="402" y2="286" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- weight bars -->
  <g>
    <rect x="406" y="110" width="150" height="20" rx="10" fill="#f1f5f9"/>
    <rect x="406" y="110" width="11" height="20" rx="10" fill="#fbbf24"/>
    <text x="566" y="125" font-size="13" font-weight="700" fill="#92400e">5%</text>
    <rect x="406" y="193" width="150" height="20" rx="10" fill="#f1f5f9"/>
    <rect x="406" y="193" width="120" height="20" rx="10" fill="#d97706"/>
    <text x="566" y="208" font-size="13" font-weight="700" fill="#92400e">80%</text>
    <rect x="406" y="276" width="150" height="20" rx="10" fill="#f1f5f9"/>
    <rect x="406" y="276" width="23" height="20" rx="10" fill="#fbbf24"/>
    <text x="566" y="291" font-size="13" font-weight="700" fill="#92400e">15%</text>
  </g>

  <!-- weights into blend -->
  <path d="M590,120 C636,120 632,180 660,194" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <path d="M590,203 L660,203" stroke="#cbd5e1" stroke-width="2"/>
  <path d="M590,286 C636,286 632,226 660,212" fill="none" stroke="#cbd5e1" stroke-width="2"/>

  <!-- blend / output -->
  <circle cx="678" cy="203" r="22" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="678" y="209" text-anchor="middle" font-size="20" font-weight="700" fill="#065f46">Σ</text>
  <line x1="678" y1="225" x2="678" y2="300" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="606" y="304" width="144" height="58" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="678" y="328" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">context-aware</text>
  <text x="678" y="346" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">vector for "bank"</text>

  <text x="300" y="350" text-anchor="middle" font-size="13" fill="#64748b">"river" wins the most attention, so "bank"</text>
  <text x="300" y="368" text-anchor="middle" font-size="13" fill="#64748b">now means a <tspan font-weight="700" fill="#1e293b">riverbank</tspan>, not a money bank.</text>
</svg>
