<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 340" width="820" height="340" role="img" aria-label="A residual connection: the input vector flows through a sub-layer, then the original input is added back to the sub-layer's output, and the sum is passed through layer normalization. The skip path lets the original signal survive deep stacks.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#059669"/></marker>
  </defs>
  <rect x="8" y="8" width="804" height="324" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="410" y="42" text-anchor="middle" font-size="15" fill="#64748b">The <tspan font-weight="700" fill="#1e293b">residual connection</tspan>: add the original input back, then normalize</text>

  <!-- input -->
  <rect x="36" y="120" width="120" height="64" rx="12" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="96" y="146" text-anchor="middle" font-size="13" font-weight="700" fill="#334155">input x</text>
  <text x="96" y="168" text-anchor="middle" font-size="12" class="mono" fill="#475569">[1.0, 2.0]</text>

  <!-- arrow to sublayer -->
  <line x1="156" y1="152" x2="206" y2="152" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- sublayer -->
  <rect x="210" y="116" width="160" height="72" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="290" y="142" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3730a3">Sub-layer</text>
  <text x="290" y="162" text-anchor="middle" font-size="11.5" fill="#4f46e5">Attention or FFN</text>
  <text x="290" y="178" text-anchor="middle" font-size="11" class="mono" fill="#4f46e5">→ [0.1, -0.3]</text>

  <!-- arrow to plus -->
  <line x1="370" y1="152" x2="430" y2="152" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- plus node -->
  <circle cx="460" cy="152" r="24" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="460" y="160" text-anchor="middle" font-size="24" font-weight="700" fill="#059669">+</text>

  <!-- skip path -->
  <path d="M96,120 C96,70 460,52 460,128" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahg)"/>
  <text x="278" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#059669">skip connection — original x carried straight across</text>

  <!-- arrow to sum chip -->
  <line x1="484" y1="152" x2="528" y2="152" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- sum chip -->
  <rect x="532" y="124" width="106" height="56" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="585" y="146" text-anchor="middle" font-size="11.5" fill="#475569">sum</text>
  <text x="585" y="166" text-anchor="middle" font-size="12" class="mono" fill="#334155">[1.1, 1.7]</text>

  <!-- arrow to norm -->
  <line x1="638" y1="152" x2="676" y2="152" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- layer norm -->
  <rect x="680" y="116" width="100" height="72" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="730" y="142" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">Layer</text>
  <text x="730" y="160" text-anchor="middle" font-size="13" font-weight="700" fill="#0c4a6e">Norm</text>
  <text x="730" y="178" text-anchor="middle" font-size="10.5" class="mono" fill="#0284c7">rescale</text>

  <text x="410" y="252" text-anchor="middle" font-size="13" fill="#64748b">Without the skip, deep stacks <tspan font-weight="700" fill="#1e293b">forget the input</tspan>; adding x back keeps the signal alive.</text>
  <text x="410" y="290" text-anchor="middle" font-size="13" class="mono" fill="#475569">output = LayerNorm( x + Sublayer(x) )</text>
</svg>
