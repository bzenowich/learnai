<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360" role="img" aria-label="The same model scores reshaped by temperature. Low temperature (0.5) makes one token dominate, a sharp spiky distribution. Temperature 1.0 keeps the model's natural spread. High temperature (2.0) flattens the distribution so unlikely tokens get a real chance.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
  </defs>
  <rect x="8" y="8" width="744" height="344" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="380" y="42" text-anchor="middle" font-size="15" fill="#64748b"><tspan font-weight="700" fill="#1e293b">Temperature</tspan> reshapes the same scores into the final probabilities</text>

  <!-- Panel 1: T=0.5 -->
  <g transform="translate(40,0)">
    <rect x="0" y="64" width="214" height="248" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="107" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">T = 0.5 · sharp</text>
    <line x1="20" y1="288" x2="194" y2="288" stroke="#cbd5e1"/>
    <rect x="24" y="284" width="26" height="4" fill="#c7d2fe"/>
    <rect x="62" y="280" width="26" height="8" fill="#c7d2fe"/>
    <rect x="100" y="168" width="26" height="120" fill="#4f46e5"/>
    <rect x="138" y="280" width="26" height="8" fill="#c7d2fe"/>
    <rect x="176" y="283" width="26" height="5" fill="#c7d2fe"/>
    <text x="113" y="160" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">85%</text>
    <text x="107" y="306" text-anchor="middle" font-size="11" fill="#94a3b8">picks "cool" nearly always</text>
  </g>

  <!-- Panel 2: T=1.0 -->
  <g transform="translate(273,0)">
    <rect x="0" y="64" width="214" height="248" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="107" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">T = 1.0 · natural</text>
    <line x1="20" y1="288" x2="194" y2="288" stroke="#cbd5e1"/>
    <rect x="24" y="272" width="26" height="16" fill="#c7d2fe"/>
    <rect x="62" y="264" width="26" height="24" fill="#c7d2fe"/>
    <rect x="100" y="216" width="26" height="72" fill="#4f46e5"/>
    <rect x="138" y="258" width="26" height="30" fill="#c7d2fe"/>
    <rect x="176" y="268" width="26" height="20" fill="#c7d2fe"/>
    <text x="113" y="208" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">45%</text>
    <text x="107" y="306" text-anchor="middle" font-size="11" fill="#94a3b8">the model's own spread</text>
  </g>

  <!-- Panel 3: T=2.0 -->
  <g transform="translate(506,0)">
    <rect x="0" y="64" width="214" height="248" rx="12" fill="#f8fafc" stroke="#e2e8f0"/>
    <text x="107" y="90" text-anchor="middle" font-size="14" font-weight="700" fill="#334155">T = 2.0 · flat</text>
    <line x1="20" y1="288" x2="194" y2="288" stroke="#cbd5e1"/>
    <rect x="24" y="264" width="26" height="24" fill="#c7d2fe"/>
    <rect x="62" y="258" width="26" height="30" fill="#c7d2fe"/>
    <rect x="100" y="244" width="26" height="44" fill="#4f46e5"/>
    <rect x="138" y="256" width="26" height="32" fill="#c7d2fe"/>
    <rect x="176" y="262" width="26" height="26" fill="#c7d2fe"/>
    <text x="113" y="236" text-anchor="middle" font-size="11" font-weight="700" fill="#3730a3">28%</text>
    <text x="107" y="306" text-anchor="middle" font-size="11" fill="#94a3b8">surprising tokens get a chance</text>
  </g>

  <text x="380" y="338" text-anchor="middle" font-size="13" fill="#64748b">Bars are the 5 candidate tokens. Low temp = predictable, high temp = creative &amp; risky.</text>
</svg>
