<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 470" width="600" height="470" role="img" aria-label="A Transformer layer passes vectors through self-attention then a feed-forward network. Each block has a residual connection that adds its input back before normalization, and the whole layer repeats N times.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
    <marker id="ahg" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#059669"/></marker>
  </defs>
  <rect x="8" y="8" width="584" height="454" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="300" y="40" text-anchor="middle" font-size="15" font-weight="700" fill="#1e293b">Inside one Transformer layer</text>

  <!-- center flow x = 280, blocks x 190..370 -->
  <!-- input -->
  <rect x="200" y="58" width="160" height="38" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="280" y="82" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">input vectors</text>
  <line x1="280" y1="96" x2="280" y2="116" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- attention -->
  <rect x="190" y="118" width="180" height="62" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="2"/>
  <text x="280" y="144" text-anchor="middle" font-size="14.5" font-weight="700" fill="#3730a3">Self-Attention</text>
  <text x="280" y="164" text-anchor="middle" font-size="11.5" fill="#4f46e5">each word looks at the others</text>
  <line x1="280" y1="180" x2="280" y2="202" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- add & norm 1 -->
  <rect x="200" y="204" width="160" height="40" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="280" y="229" text-anchor="middle" font-size="13.5" font-weight="700" fill="#475569">Add &amp; Norm</text>
  <line x1="280" y1="244" x2="280" y2="266" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- feed forward -->
  <rect x="190" y="268" width="180" height="62" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="2"/>
  <text x="280" y="294" text-anchor="middle" font-size="14.5" font-weight="700" fill="#0c4a6e">Feed-Forward</text>
  <text x="280" y="314" text-anchor="middle" font-size="11.5" fill="#0284c7">refine each vector on its own</text>
  <line x1="280" y1="330" x2="280" y2="352" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- add & norm 2 -->
  <rect x="200" y="354" width="160" height="40" rx="10" fill="#f1f5f9" stroke="#94a3b8"/>
  <text x="280" y="379" text-anchor="middle" font-size="13.5" font-weight="700" fill="#475569">Add &amp; Norm</text>
  <line x1="280" y1="394" x2="280" y2="414" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- output -->
  <rect x="200" y="416" width="160" height="38" rx="10" fill="#f8fafc" stroke="#cbd5e1"/>
  <text x="280" y="440" text-anchor="middle" font-size="13.5" font-weight="600" fill="#334155">on to the next layer</text>

  <!-- residual 1 (around attention) -->
  <path d="M360,107 C430,107 438,107 438,150 C438,193 392,210 372,221" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahg)"/>
  <!-- residual 2 (around feed forward) -->
  <path d="M360,255 C430,255 438,255 438,300 C438,345 392,360 372,371" fill="none" stroke="#059669" stroke-width="2" stroke-dasharray="5 4" marker-end="url(#ahg)"/>
  <text x="452" y="150" font-size="12" font-weight="700" fill="#059669">skip</text>
  <text x="452" y="166" font-size="12" font-weight="700" fill="#059669">(+)</text>
  <text x="452" y="300" font-size="12" font-weight="700" fill="#059669">skip</text>
  <text x="452" y="316" font-size="12" font-weight="700" fill="#059669">(+)</text>

  <!-- repeat bracket -->
  <path d="M150,118 h-14 v276 h14" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <text x="128" y="252" text-anchor="middle" font-size="13" font-weight="700" fill="#64748b" transform="rotate(-90 128 252)">repeat × N layers</text>
</svg>
