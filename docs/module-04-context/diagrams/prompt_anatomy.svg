<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 440" width="720" height="440" role="img" aria-label="A prompt stacks four layers — system instructions, conversation history, retrieved documents, and the user question — into a single block that is sent to the model.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748b"/></marker>
  </defs>
  <rect x="8" y="8" width="704" height="424" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="360" y="40" text-anchor="middle" font-size="15" fill="#64748b">Your question is just one layer — the model receives a <tspan font-weight="700" fill="#1e293b">stack of context</tspan></text>

  <!-- outer prompt container -->
  <rect x="48" y="60" width="500" height="356" rx="14" fill="#f8fafc" stroke="#cbd5e1" stroke-dasharray="6 4"/>
  <text x="64" y="80" font-size="12" font-weight="700" fill="#94a3b8" letter-spacing="1">THE FULL PROMPT</text>

  <!-- band helper: rect + accent + label + example -->
  <!-- System -->
  <rect x="68" y="90" width="460" height="68" rx="10" fill="#fff1f2" stroke="#fecdd3"/>
  <rect x="68" y="90" width="8" height="68" rx="4" fill="#e11d48"/>
  <text x="92" y="116" font-size="14.5" font-weight="700" fill="#9f1239">System instructions</text>
  <text x="92" y="138" font-size="12.5" class="mono" fill="#be123c">"You are a concise, friendly tutor…"</text>
  <text x="516" y="100" text-anchor="end" font-size="11" fill="#fb7185">the persona</text>

  <!-- History -->
  <rect x="68" y="166" width="460" height="68" rx="10" fill="#f1f5f9" stroke="#e2e8f0"/>
  <rect x="68" y="166" width="8" height="68" rx="4" fill="#64748b"/>
  <text x="92" y="192" font-size="14.5" font-weight="700" fill="#334155">Conversation history</text>
  <text x="92" y="214" font-size="12.5" class="mono" fill="#475569">User: What is a vector? / Assistant: …</text>
  <text x="516" y="176" text-anchor="end" font-size="11" fill="#94a3b8">the memory</text>

  <!-- Retrieved documents -->
  <rect x="68" y="242" width="460" height="68" rx="10" fill="#ecfdf5" stroke="#bbf7d0"/>
  <rect x="68" y="242" width="8" height="68" rx="4" fill="#059669"/>
  <text x="92" y="268" font-size="14.5" font-weight="700" fill="#065f46">Retrieved documents</text>
  <text x="92" y="290" font-size="12.5" class="mono" fill="#047857">[pasted text from a PDF or web page…]</text>
  <text x="516" y="252" text-anchor="end" font-size="11" fill="#34d399">the context</text>

  <!-- User question -->
  <rect x="68" y="318" width="460" height="68" rx="10" fill="#eef2ff" stroke="#c7d2fe"/>
  <rect x="68" y="318" width="8" height="68" rx="4" fill="#4f46e5"/>
  <text x="92" y="344" font-size="14.5" font-weight="700" fill="#3730a3">User question</text>
  <text x="92" y="366" font-size="12.5" class="mono" fill="#4338ca">"How do I multiply two of them?"</text>
  <text x="516" y="328" text-anchor="end" font-size="11" fill="#818cf8">the query</text>

  <!-- brace + arrow to model -->
  <path d="M560,92 q12,0 12,14 v76 q0,14 12,14 q-12,0 -12,14 v76 q0,14 -12,14" fill="none" stroke="#cbd5e1" stroke-width="2"/>
  <line x1="586" y1="238" x2="624" y2="238" stroke="#64748b" stroke-width="2" marker-end="url(#ah)"/>
  <rect x="628" y="206" width="68" height="64" rx="12" fill="#1e293b"/>
  <text x="662" y="234" text-anchor="middle" font-size="13" font-weight="700" fill="#ffffff">LLM</text>
  <text x="662" y="254" text-anchor="middle" font-size="11" fill="#94a3b8">reads</text>
  <text x="662" y="266" text-anchor="middle" font-size="11" fill="#94a3b8">it all</text>
</svg>
