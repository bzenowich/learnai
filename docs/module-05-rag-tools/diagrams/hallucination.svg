<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" width="760" height="360" role="img" aria-label="A model's frozen weights answer from memory. A question about facts seen in training returns a correct answer. A question about facts never seen still returns a confident answer, but it is made up — a hallucination.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="8" y="8" width="744" height="344" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="380" y="42" text-anchor="middle" font-size="15" fill="#64748b">Frozen weights answer from memory — and <tspan font-weight="700" fill="#1e293b">never admit a blank</tspan></text>

  <!-- frozen weights box (center) -->
  <rect x="300" y="118" width="160" height="124" rx="14" fill="#1e293b"/>
  <text x="380" y="158" text-anchor="middle" font-size="14.5" font-weight="700" fill="#ffffff">Model weights</text>
  <text x="380" y="180" text-anchor="middle" font-size="11.5" fill="#94a3b8">frozen at training</text>
  <text x="380" y="216" text-anchor="middle" font-size="24" fill="#cbd5e1">❄</text>

  <!-- top path: known -->
  <rect x="40" y="92" width="150" height="56" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="115" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">Seen in training</text>
  <text x="115" y="135" text-anchor="middle" font-size="10.5" class="mono" fill="#4338ca">"Capital of France?"</text>
  <path d="M190,120 C250,120 250,150 296,150" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="568" y="92" width="150" height="56" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="643" y="116" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">✓ Correct</text>
  <text x="643" y="135" text-anchor="middle" font-size="10.5" class="mono" fill="#047857">"Paris"</text>
  <path d="M460,150 C510,150 510,120 564,120" fill="none" stroke="#059669" stroke-width="2" marker-end="url(#ah)"/>

  <!-- bottom path: unknown -->
  <rect x="40" y="212" width="150" height="56" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="115" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#3730a3">Never seen</text>
  <text x="115" y="255" text-anchor="middle" font-size="10.5" class="mono" fill="#4338ca">"Our Q3 revenue?"</text>
  <path d="M190,240 C250,240 250,210 296,210" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <rect x="568" y="212" width="150" height="56" rx="12" fill="#fff1f2" stroke="#e11d48" stroke-width="1.5"/>
  <text x="643" y="236" text-anchor="middle" font-size="12" font-weight="700" fill="#9f1239">✗ Hallucination</text>
  <text x="643" y="255" text-anchor="middle" font-size="10.5" class="mono" fill="#be123c">"$4.2M" (made up)</text>
  <path d="M460,210 C510,210 510,240 564,240" fill="none" stroke="#e11d48" stroke-width="2" marker-end="url(#ah)"/>

  <text x="380" y="316" text-anchor="middle" font-size="13" fill="#64748b">No lookup, no "I don't know" — just the <tspan font-weight="700" fill="#1e293b">most plausible-sounding</tspan> next words. RAG fixes this.</text>
</svg>
