<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 380" width="860" height="380" role="img" aria-label="RAG works in three steps: retrieve the most similar document from a vector database, augment the user's question with that text, then generate a grounded answer with the LLM.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}.mono{font-family:ui-monospace,'SF Mono',Menlo,Consolas,monospace}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#94a3b8"/></marker>
  </defs>
  <rect x="8" y="8" width="844" height="364" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>

  <!-- phase bands -->
  <rect x="24" y="44" width="376" height="26" rx="13" fill="#f0f9ff"/>
  <text x="212" y="62" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0284c7">① RETRIEVE</text>
  <rect x="414" y="44" width="208" height="26" rx="13" fill="#ecfdf5"/>
  <text x="518" y="62" text-anchor="middle" font-size="12.5" font-weight="700" fill="#059669">② AUGMENT</text>
  <rect x="636" y="44" width="200" height="26" rx="13" fill="#fff7ed"/>
  <text x="736" y="62" text-anchor="middle" font-size="12.5" font-weight="700" fill="#d97706">③ GENERATE</text>

  <!-- query -->
  <rect x="24" y="150" width="128" height="72" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="88" y="180" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3730a3">User query</text>
  <text x="88" y="201" text-anchor="middle" font-size="11.5" class="mono" fill="#4338ca">"Who is a king?"</text>

  <!-- query -> DB -->
  <line x1="152" y1="186" x2="190" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <text x="171" y="176" text-anchor="middle" font-size="10" fill="#94a3b8">embed</text>

  <!-- vector DB cylinder -->
  <g>
    <path d="M198,128 a60,14 0 0 1 120,0 v100 a60,14 0 0 1 -120,0 z" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
    <ellipse cx="258" cy="128" rx="60" ry="14" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
    <text x="258" y="124" text-anchor="middle" font-size="12.5" font-weight="700" fill="#5b21b6">Vector DB</text>
    <!-- doc rows w/ similarity -->
    <rect x="214" y="150" width="88" height="20" rx="5" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="220" y="164" font-size="10.5" class="mono" fill="#6d28d9">apple   0.1</text>
    <rect x="214" y="176" width="88" height="20" rx="5" fill="#dcfce7" stroke="#059669"/>
    <text x="220" y="190" font-size="10.5" class="mono" font-weight="700" fill="#065f46">king    0.9</text>
    <rect x="214" y="202" width="88" height="20" rx="5" fill="#ffffff" stroke="#ddd6fe"/>
    <text x="220" y="216" font-size="10.5" class="mono" fill="#6d28d9">python  0.2</text>
  </g>
  <text x="258" y="250" text-anchor="middle" font-size="10.5" fill="#94a3b8">dot-product search</text>

  <!-- DB -> best doc -->
  <line x1="318" y1="186" x2="356" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- best doc -->
  <rect x="360" y="158" width="50" height="56" rx="9" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="385" y="182" text-anchor="middle" font-size="10.5" fill="#065f46">best</text>
  <text x="385" y="196" text-anchor="middle" font-size="10.5" fill="#065f46">doc</text>

  <!-- best doc -> augmented prompt -->
  <line x1="410" y1="160" x2="448" y2="138" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <!-- query -> augmented prompt (bottom path) -->
  <path d="M88,222 C88,300 300,300 448,250" fill="none" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>
  <text x="250" y="296" text-anchor="middle" font-size="10.5" fill="#94a3b8">original question carried along</text>

  <!-- augmented prompt -->
  <rect x="452" y="110" width="156" height="156" rx="12" fill="#f8fafc" stroke="#059669" stroke-width="1.5"/>
  <text x="530" y="132" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Augmented prompt</text>
  <rect x="468" y="146" width="124" height="44" rx="8" fill="#ecfdf5" stroke="#bbf7d0"/>
  <text x="478" y="164" font-size="10.5" class="mono" fill="#047857">Context: "A king is</text>
  <text x="478" y="178" font-size="10.5" class="mono" fill="#047857">a male ruler…"</text>
  <rect x="468" y="198" width="124" height="44" rx="8" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="478" y="216" font-size="10.5" class="mono" fill="#4338ca">Question: "Who is</text>
  <text x="478" y="230" font-size="10.5" class="mono" fill="#4338ca">a king?"</text>

  <!-- prompt -> LLM -->
  <line x1="608" y1="186" x2="650" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- LLM -->
  <rect x="654" y="150" width="74" height="72" rx="12" fill="#1e293b"/>
  <text x="691" y="182" text-anchor="middle" font-size="14" font-weight="700" fill="#ffffff">LLM</text>
  <text x="691" y="202" text-anchor="middle" font-size="10.5" fill="#94a3b8">reads both</text>

  <!-- LLM -> answer -->
  <line x1="728" y1="186" x2="752" y2="186" stroke="#94a3b8" stroke-width="2" marker-end="url(#ah)"/>

  <!-- answer -->
  <rect x="756" y="150" width="80" height="72" rx="12" fill="#fff7ed" stroke="#d97706" stroke-width="1.5"/>
  <text x="796" y="178" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400e">Grounded</text>
  <text x="796" y="196" text-anchor="middle" font-size="12.5" font-weight="700" fill="#92400e">answer</text>

  <text x="430" y="346" text-anchor="middle" font-size="13" fill="#64748b">The model <tspan font-weight="700" fill="#1e293b">reads the facts</tspan> instead of recalling them — far fewer hallucinations.</text>
</svg>
