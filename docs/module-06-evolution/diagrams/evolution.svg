<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 860 440" width="860" height="440" role="img" aria-label="AI systems evolve through five levels of rising capability: simple stateless chat, context-aware chat, reasoning, agentic tool use, and collaborating multi-agent systems.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
    <marker id="ah" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#4f46e5"/></marker>
  </defs>
  <rect x="8" y="8" width="844" height="424" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="430" y="42" text-anchor="middle" font-size="16" font-weight="700" fill="#1e293b">Five levels of AI — each one builds on the last</text>

  <!-- rising capability arrow (rides just above the staircase tops) -->
  <line x1="44" y1="272" x2="826" y2="84" stroke="#6366f1" stroke-width="2" stroke-dasharray="6 5" marker-end="url(#ah)"/>
  <text x="70" y="150" font-size="13" font-weight="700" fill="#6366f1">more autonomy &amp; capability →</text>

  <!-- floor -->
  <line x1="40" y1="400" x2="838" y2="400" stroke="#e2e8f0" stroke-width="2"/>

  <!-- steps: width 150, gap 12, baseline y=400 -->
  <!-- L1 -->
  <rect x="40" y="280" width="150" height="120" rx="10" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="56" y="306" font-size="12" font-weight="700" fill="#64748b">LEVEL 1</text>
  <text x="56" y="332" font-size="15" font-weight="700" fill="#334155">Simple Chat</text>
  <text x="56" y="356" font-size="12" fill="#64748b">stateless</text>
  <text x="56" y="372" font-size="12" fill="#64748b">Q &amp; A</text>

  <!-- L2 -->
  <rect x="202" y="235" width="150" height="165" rx="10" fill="#eef2ff" stroke="#6366f1" stroke-width="1.5"/>
  <text x="218" y="261" font-size="12" font-weight="700" fill="#6366f1">LEVEL 2</text>
  <text x="218" y="287" font-size="15" font-weight="700" fill="#3730a3">Context-Aware</text>
  <text x="218" y="311" font-size="12" fill="#4f46e5">remembers</text>
  <text x="218" y="327" font-size="12" fill="#4f46e5">the history</text>

  <!-- L3 -->
  <rect x="364" y="190" width="150" height="210" rx="10" fill="#e0e7ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="380" y="216" font-size="12" font-weight="700" fill="#4f46e5">LEVEL 3</text>
  <text x="380" y="242" font-size="15" font-weight="700" fill="#3730a3">Reasoning</text>
  <text x="380" y="266" font-size="12" fill="#4338ca">thinks before</text>
  <text x="380" y="282" font-size="12" fill="#4338ca">it answers</text>

  <!-- L4 -->
  <rect x="526" y="145" width="150" height="255" rx="10" fill="#ede9fe" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="542" y="171" font-size="12" font-weight="700" fill="#7c3aed">LEVEL 4</text>
  <text x="542" y="197" font-size="15" font-weight="700" fill="#5b21b6">Agentic</text>
  <text x="542" y="221" font-size="12" fill="#6d28d9">uses tools</text>
  <text x="542" y="237" font-size="12" fill="#6d28d9">&amp; makes plans</text>

  <!-- L5 -->
  <rect x="688" y="100" width="150" height="300" rx="10" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
  <text x="704" y="126" font-size="12" font-weight="700" fill="#b45309">LEVEL 5</text>
  <text x="704" y="152" font-size="15" font-weight="700" fill="#92400e">Multi-Agent</text>
  <text x="704" y="176" font-size="12" fill="#b45309">specialized</text>
  <text x="704" y="192" font-size="12" fill="#b45309">agents</text>
  <text x="704" y="208" font-size="12" fill="#b45309">collaborate</text>
</svg>
