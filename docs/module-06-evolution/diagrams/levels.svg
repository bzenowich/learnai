<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 880 360" width="880" height="360" role="img" aria-label="Five ascending levels of AI capability. Level 1 is stateless chat. Level 2 adds memory of the conversation. Level 3 adds a reasoning loop that checks its own work. Level 4 adds tools and autonomy to act. Level 5 coordinates multiple specialized agents.">
  <style>text{font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto,Helvetica,Arial,sans-serif}</style>
  <defs>
    <filter id="card" x="-3%" y="-3%" width="106%" height="112%"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.08"/></filter>
  </defs>
  <rect x="8" y="8" width="864" height="344" rx="16" fill="#ffffff" stroke="#e5e7eb" filter="url(#card)"/>
  <text x="440" y="42" text-anchor="middle" font-size="15" fill="#64748b">Each level <tspan font-weight="700" fill="#1e293b">keeps the last one and adds a new power</tspan></text>

  <!-- ascending steps; each box 150 wide, rising -->
  <!-- L1 -->
  <rect x="30" y="232" width="156" height="84" rx="12" fill="#f1f5f9" stroke="#94a3b8" stroke-width="1.5"/>
  <text x="108" y="258" text-anchor="middle" font-size="13.5" font-weight="700" fill="#334155">Level 1</text>
  <text x="108" y="278" text-anchor="middle" font-size="11.5" fill="#475569">Simple chat</text>
  <text x="108" y="296" text-anchor="middle" font-size="10.5" fill="#94a3b8">stateless, forgets</text>

  <!-- L2 -->
  <rect x="196" y="196" width="156" height="120" rx="12" fill="#eef2ff" stroke="#4f46e5" stroke-width="1.5"/>
  <text x="274" y="222" text-anchor="middle" font-size="13.5" font-weight="700" fill="#3730a3">Level 2</text>
  <text x="274" y="242" text-anchor="middle" font-size="11.5" fill="#4338ca">Context-aware</text>
  <text x="274" y="260" text-anchor="middle" font-size="10.5" fill="#4f46e5">+ memory</text>
  <text x="274" y="278" text-anchor="middle" font-size="10.5" fill="#94a3b8">remembers the</text>
  <text x="274" y="292" text-anchor="middle" font-size="10.5" fill="#94a3b8">conversation</text>

  <!-- L3 -->
  <rect x="362" y="160" width="156" height="156" rx="12" fill="#f0f9ff" stroke="#0284c7" stroke-width="1.5"/>
  <text x="440" y="186" text-anchor="middle" font-size="13.5" font-weight="700" fill="#0c4a6e">Level 3</text>
  <text x="440" y="206" text-anchor="middle" font-size="11.5" fill="#0369a1">Reasoning</text>
  <text x="440" y="224" text-anchor="middle" font-size="10.5" fill="#0284c7">+ self-check loop</text>
  <text x="440" y="244" text-anchor="middle" font-size="10.5" fill="#94a3b8">plans, critiques</text>
  <text x="440" y="258" text-anchor="middle" font-size="10.5" fill="#94a3b8">and retries</text>

  <!-- L4 -->
  <rect x="528" y="124" width="156" height="192" rx="12" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="606" y="150" text-anchor="middle" font-size="13.5" font-weight="700" fill="#065f46">Level 4</text>
  <text x="606" y="170" text-anchor="middle" font-size="11.5" fill="#047857">Agentic</text>
  <text x="606" y="188" text-anchor="middle" font-size="10.5" fill="#059669">+ tools &amp; autonomy</text>
  <text x="606" y="208" text-anchor="middle" font-size="10.5" fill="#94a3b8">acts on the world,</text>
  <text x="606" y="222" text-anchor="middle" font-size="10.5" fill="#94a3b8">pursues a goal</text>

  <!-- L5 -->
  <rect x="694" y="88" width="156" height="228" rx="12" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="772" y="114" text-anchor="middle" font-size="13.5" font-weight="700" fill="#5b21b6">Level 5</text>
  <text x="772" y="134" text-anchor="middle" font-size="11.5" fill="#6d28d9">Multi-agent</text>
  <text x="772" y="152" text-anchor="middle" font-size="10.5" fill="#7c3aed">+ thinking &amp; teams</text>
  <text x="772" y="172" text-anchor="middle" font-size="10.5" fill="#94a3b8">specialized agents</text>
  <text x="772" y="186" text-anchor="middle" font-size="10.5" fill="#94a3b8">collaborate</text>

  <!-- rising arrow -->
  <text x="440" y="338" text-anchor="middle" font-size="12.5" fill="#94a3b8">more memory · more reasoning · more autonomy  →</text>
</svg>
